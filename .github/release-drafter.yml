name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "bugfix"
  - title: "🧰 Maintenance"
    labels:
      - "improvements"
      - "chore"
      - "dependencies"
      - "documentation"
exclude-labels:
  - "bot"
  - "dependabot"
  - "ci"
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "bugfix"
      - "improvements"
      - "chore"
      - "dependencies"
      - "documentation"
  default: patch
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES
